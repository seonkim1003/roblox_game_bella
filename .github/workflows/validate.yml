name: Validate Roblox project

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install pinned Roblox tools
        uses: roblox-ts/setup-rokit@v0.1.2

      - name: Validate and build
        shell: pwsh
        run: ./scripts/validate.ps1

      - name: Upload playable build
        uses: actions/upload-artifact@v4
        with:
          name: roblox-game-${{ github.sha }}
          path: artifacts/roblox_game.rbxl
          if-no-files-found: error
          retention-days: 14
